version: "3.9"

services:
  # ---- PostgreSQL Database ----
  db:
    image: postgres:16-alpine
    container_name: jerney-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: jerney_user
      POSTGRES_PASSWORD: jerney_pass_2026
      POSTGRES_DB: jerney_db
    ports:
      - "5433:5432"   # host:container -> avoids conflict with host PostgreSQL
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jerney_user -d jerney_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---- Backend API ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jerney-backend
    restart: unless-stopped
    environment:
      PORT: "5000"
      DB_USER: jerney_user
      DB_PASSWORD: jerney_pass_2026
      DB_HOST: db
      DB_PORT: "5432"   # container port, not host port
      DB_NAME: jerney_db
    expose:
      - "5000"           # internal Docker network
    depends_on:
      db:
        condition: service_healthy

  # ---- Frontend (React + Nginx) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jerney-frontend
    restart: unless-stopped
    ports:
      - "8587:80"        # host:container -> avoid port conflicts
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: "http://backend:5000"   # backend hostname in Docker network

volumes:
  pgdata:
    driver: local